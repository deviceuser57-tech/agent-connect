name: Clean & Sync Repo

on:
  workflow_dispatch:

jobs:
  reset-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 🧨 يمسح كل حاجة ماعدا .git و .github
      - name: Clean repository
        run: |
          shopt -s extglob dotglob
          rm -rf !(.git|.github)

      # 📥 يسحب الريبو الأساسي
      - name: Clone source repo
        run: |
          git clone --depth=1 https://github.com/deviceuser57-tech/Multi-Agent-workflow.git source

      # 📂 ينقل الملفات
      - name: Copy files
        run: |
          rsync -av source/ ./ --exclude .git --exclude .github

      # 🚀 commit + push
      - name: Commit & Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Full reset & sync"

          git push https://x-access-token:${GITHUB_TOKEN}@github.com/deviceuser57-tech/agent-connect.git HEAD:main
