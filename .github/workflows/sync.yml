name: Clean & Sync Repo

on:
  workflow_dispatch:

jobs:
  reset-and-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 🧨 يمسح كل حاجة ماعدا .git و .github
      - name: Clean repository
        run: |
          find . -mindepth 1 \
          ! -regex '^./\.git\(/.*\)?' \
          ! -regex '^./\.github\(/.*\)?' \
          -delete

      # 📥 يسحب الريبو الأساسي
      - name: Clone source repo
        run: |
          git clone --depth=1 https://github.com/deviceuser57-tech/Multi-Agent-workflow.git source

      # 📂 ينقل الملفات
      - name: Copy files
        run: |
          rsync -av source/ ./ --exclude .git --exclude .github

      # 🚀 commit + push
      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Full reset & sync" || echo "No changes"
          git push
